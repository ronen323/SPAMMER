<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Ronen Spammer</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding-top: 100px; }
        .login-box { border: 2px solid #ff0000; display: inline-block; padding: 40px; border-radius: 10px; box-shadow: 0 0 15px #ff0000; }
        input { background: #111; border: 1px solid #ff0000; color: #fff; padding: 10px; margin: 10px; width: 250px; }
        button { background: #ff0000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        a { color: #888; text-decoration: none; font-size: 0.8em; display: block; margin-top: 10px; }
        .spam-warning { color: #ffff00; font-size: 0.7em; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>LOGIN</h1>
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">LOGIN</button>
        </form>
        <a href="/reset-password" style="color: #ff4444;">Forgot Password?</a>
        <a href="/register">New User? Create Account</a>
        <p class="spam-warning">* Check your **SPAM FOLDER** for verification emails!</p>
    </div>
</body>
</html>
